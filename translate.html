<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cherry's Translation Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #c8a97e;
    --good: #7ec8a0;
    --text: #e8e4dc;
    --muted: #7a7a8a;
    --danger: #c87e7e;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .container { max-width: 640px; margin: 0 auto; }

  .logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 4px; }
  .sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 24px; }

  .key-row { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }

  input[type="password"] {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; color: var(--text);
  }
  input:focus { outline: none; border-color: var(--accent); }

  .save-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 10px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; cursor: pointer; white-space: nowrap;
  }
  .save-btn.saved { color: var(--good); border-color: var(--good); }

  label {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); display: block; margin-bottom: 6px;
  }

  textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    font-size: 0.88rem; color: var(--text); resize: vertical; line-height: 1.7; margin-bottom: 12px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea.editable { border-color: #3a3a45; }
  textarea.editable:focus { border-color: var(--accent); }

  /* IMAGE UPLOAD */
  .img-upload-area {
    border: 1px dashed var(--border); border-radius: 10px;
    padding: 16px; text-align: center; cursor: pointer;
    margin-bottom: 12px; transition: border-color 0.2s;
    position: relative;
  }
  .img-upload-area:hover { border-color: var(--accent); }
  .img-upload-area input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .img-upload-label { font-size: 0.82rem; color: var(--muted); }
  .img-upload-label span { color: var(--accent); }

  .img-preview {
    display: none; margin-bottom: 12px;
    border-radius: 8px; overflow: hidden; position: relative;
  }
  .img-preview img { width: 100%; border-radius: 8px; max-height: 200px; object-fit: cover; }
  .img-preview-clear {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.6); border: none; color: var(--text);
    border-radius: 50%; width: 24px; height: 24px; cursor: pointer;
    font-size: 0.75rem; display: flex; align-items: center; justify-content: center;
  }

  .extract-btn {
    width: 100%; background: none; border: 1px solid var(--purple, #a07ec8);
    color: var(--purple, #a07ec8); padding: 10px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    cursor: pointer; margin-bottom: 12px; transition: all 0.15s;
    display: none;
  }
  .extract-btn:hover { background: var(--purple, #a07ec8); color: #0d0d0f; }

  .go-btn {
    width: 100%; background: linear-gradient(135deg, var(--accent), #e8c99e);
    border: none; color: #0d0d0f; padding: 13px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.9rem;
    cursor: pointer; margin-bottom: 24px; transition: opacity 0.2s;
  }
  .go-btn:hover { opacity: 0.88; }
  .go-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 14px;
  }

  .result-label {
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }

  .copy-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 10px; border-radius: 5px; font-size: 0.65rem;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    flex-shrink: 0;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.done { color: var(--good); border-color: var(--good); }

  .result-text { font-size: 0.88rem; line-height: 1.8; color: var(--text); }
  .result-text.ja { font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }

  .lang-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 0.82rem;
    color: var(--text); margin-bottom: 14px;
  }
  .lang-note { font-size: 0.7rem; color: var(--muted); }

  .lang-section-label {
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 8px;
  }

  .lang-buttons { display: flex; flex-wrap: wrap; gap: 6px; }

  .lang-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 12px; border-radius: 20px; font-size: 0.72rem;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0f; font-weight: 500; }
  .lang-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .sync-btn {
    width: 100%; background: none; border: 1px solid var(--accent);
    color: var(--accent); padding: 10px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    cursor: pointer; margin-top: 8px; transition: all 0.15s;
  }
  .sync-btn:hover { background: var(--accent); color: #0d0d0f; }

  .loading {
    text-align: center; padding: 32px; color: var(--muted);
    font-size: 0.85rem; display: none;
  }

  .step-indicator {
    display: flex; align-items: center; gap: 8px;
    justify-content: center; margin-bottom: 10px;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); transition: background 0.3s;
  }
  .step-dot.active { background: var(--accent); animation: pulse 1s infinite; }
  .step-dot.done { background: var(--good); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .error {
    background: #2e1a1a; border: 1px solid var(--danger);
    border-radius: 8px; padding: 12px 14px; font-size: 0.82rem;
    color: var(--danger); margin-bottom: 14px; display: none;
  }

  .reset-btn {
    width: 100%; background: none; border: 1px solid var(--border);
    color: var(--muted); padding: 10px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    cursor: pointer; margin-top: 8px;
  }

  #results { display: none; }

  .section-divider {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .section-divider span { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
<div class="container">

  <div class="logo">✦ Cherry's Translation Tool</div>
  <div class="sub">コメント貼り付け or スクショ → 言語検出 → 返信案生成</div>

  <div class="key-row">
    <input type="password" id="apiKey" placeholder="Anthropic API Key (sk-ant-...)" />
    <button class="save-btn" id="saveBtn" onclick="saveKey()">保存</button>
  </div>

  <!-- IMAGE UPLOAD -->
  <div class="section-divider"><span>スクショからテキスト抽出（スマホ向け）</span></div>

  <div class="img-upload-area" id="uploadArea">
    <input type="file" accept="image/*" id="imgInput" onchange="onImageSelect(event)" />
    <div class="img-upload-label">📷 スクショをアップロード or Ctrl+V で貼り付け<br><span>テキストと絵文字を自動抽出します</span></div>
  </div>

  <div class="img-preview" id="imgPreview">
    <img id="previewImg" src="" alt="preview" />
    <button class="img-preview-clear" onclick="clearImage()">✕</button>
  </div>

  <button class="extract-btn" id="extractBtn" onclick="extractText()">📝 テキストを抽出してコメント欄に入れる</button>

  <div class="section-divider"><span>コメントをここに貼り付け</span></div>

  <textarea id="commentInput" rows="5" placeholder="Paste YouTube comment here..."></textarea>

  <button class="go-btn" id="goBtn" onclick="processComment()">✦ 言語検出 + 返信案を生成</button>

  <div class="error" id="errorBox"></div>

  <div class="loading" id="loadingBox">
    <div class="step-indicator">
      <div class="step-dot" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
      <div class="step-dot" id="dot4"></div>
    </div>
    <div id="loadingLabel">処理中...</div>
  </div>

  <div id="results">

    <div class="result-box">
      <div class="result-label">🌍 検出された言語</div>
      <div id="langBadge"></div>
      <div class="lang-section-label">別の言語で返信する</div>
      <div class="lang-buttons" id="langButtons"></div>
    </div>

    <div class="result-box">
      <div class="result-label">
        🇯🇵 日本語訳（確認用）
        <button class="copy-btn" onclick="copyArea('jaText', this)">コピー</button>
      </div>
      <div class="result-text ja" id="jaText"></div>
    </div>

    <!-- ENGLISH REPLY — now editable textarea -->
    <div class="result-box">
      <div class="result-label">
        <span>✦ 返信案 <span id="replyLangLabel" style="color:var(--accent);"></span></span>
        <button class="copy-btn" onclick="copyArea('replyEnInput', this)">コピー</button>
      </div>
      <textarea class="editable" id="replyEnInput" rows="4" placeholder="返信案がここに表示されます（直接編集できます）"></textarea>
      <button class="sync-btn" onclick="syncEnToJa()">↺ 英語を編集したら日本語に同期</button>
    </div>

    <!-- JAPANESE REPLY — editable -->
    <div class="result-box">
      <div class="result-label">
        ✏️ 返信案（日本語）— 編集可能
        <button class="copy-btn" onclick="copyArea('replyJaInput', this)">コピー</button>
      </div>
      <textarea class="editable" id="replyJaInput" rows="4"></textarea>
      <button class="sync-btn" onclick="syncJaToEn()">↺ 日本語を編集したら元の言語に同期</button>
    </div>

    <button class="reset-btn" onclick="resetAll()">↩ リセット</button>

  </div>

</div>
<script>
const SYSTEM = `You are writing YouTube comment replies for Cherry, a 55-year-old Japanese woman who vlogs about solo life in Tokyo. She is warm, genuine, quietly gracious — like an elegant adult friend, never an influencer or a brand. She has a Spanish partner of 10+ years but keeps her channel focused on solo life.

TONE:
- Warm, light, gracious — adult elegance, never over-excited
- Calm and natural — like a real person, not a performance
- Match the commenter's emotional temperature exactly:
  - Light or fun comment → light, friendly reply
  - Heartfelt comment → sincere, slightly warmer reply
  - New subscriber → simple welcome, thank them for finding the channel
  - Heavy or emotional share → acknowledge their feeling briefly with one encouraging line, do NOT over-involve or give advice
  - Question about personal info → ignore the question entirely, reply only to the emotional part if any

STRUCTURE:
- SHORT — 1 to 3 sentences maximum
- No paragraph breaks (comment section, not email)
- Never start with "Oh" or heavy exclamations
- Match commenter's greeting: "Hi" → "Hello 😊", no greeting → no greeting
- Simple thank you is always enough for compliments

EMOJI:
- 1 emoji max, sometimes none
- 🤭 only for gentle self-deprecating moments
- Never multiple emoji in a row

FORBIDDEN:
- "It means a lot to me" / "Your words mean a lot"
- "I believe" → use "I think" or "I feel" or "I guess"
- "Thank you for being here" / "Here"
- Em dash (—)
- Commenter's name or handle
- Labeling commenter as "thoughtful", "insightful", "meaningful"
- "I'm just enjoying my way" or any self-narration
- Sarcasm, irony, or any condescending tone
- Quotation marks around the reply

SPECIAL CASES:
- New subscriber → "Thank you for finding my channel 😊" style, simple and warm
- Simple compliment → just "Thank you 😊", nothing more
- Someone hopes she finds love → gently mention her wonderful long-term partner
- Heavy emotional confession → one brief empathetic line + one gentle encouraging line, then stop. No life advice.
- Personal or private questions → ignore completely, do not acknowledge
- No politics, religion, ideology`;

const LANGS = [
  {code:'en',label:'English',flag:'🇬🇧'},
  {code:'es',label:'Español',flag:'🇪🇸'},
  {code:'es-419',label:'Español Latino',flag:'🌎'},
  {code:'fr',label:'Français',flag:'🇫🇷'},
  {code:'it',label:'Italiano',flag:'🇮🇹'},
  {code:'de',label:'Deutsch',flag:'🇩🇪'},
  {code:'pt',label:'Português',flag:'🇧🇷'},
  {code:'ja',label:'日本語',flag:'🇯🇵'},
  {code:'ko',label:'한국어',flag:'🇰🇷'},
  {code:'zh',label:'中文',flag:'🇨🇳'},
  {code:'ru',label:'Русский',flag:'🇷🇺'},
  {code:'sv',label:'Svenska',flag:'🇸🇪'},
  {code:'nl',label:'Nederlands',flag:'🇳🇱'},
  {code:'pl',label:'Polski',flag:'🇵🇱'},
];

let currentLang = {code:'en',label:'English',flag:'🇬🇧'};
let currentComment = '';
let apiKey = '';
let currentImageB64 = null;
let currentImageType = 'image/jpeg';

window.addEventListener('load', () => {
  const saved = localStorage.getItem('cherry_ak');
  if (saved) {
    apiKey = saved;
    document.getElementById('apiKey').value = saved;
    document.getElementById('saveBtn').textContent = '保存済 ✓';
    document.getElementById('saveBtn').classList.add('saved');
  }
});

// Ctrl+V でクリップボードから画像を貼り付け
document.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (!file) continue;
      currentImageType = file.type || 'image/jpeg';
      const reader = new FileReader();
      reader.onload = (ev) => {
        const result = ev.target.result;
        currentImageB64 = result.split(',')[1];
        document.getElementById('previewImg').src = result;
        document.getElementById('imgPreview').style.display = 'block';
        document.getElementById('extractBtn').style.display = 'block';
        document.getElementById('uploadArea').style.display = 'none';
      };
      reader.readAsDataURL(file);
      break;
    }
  }
});

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k) return;
  apiKey = k;
  localStorage.setItem('cherry_ak', k);
  const btn = document.getElementById('saveBtn');
  btn.textContent = '保存済 ✓';
  btn.classList.add('saved');
}

// IMAGE UPLOAD
function onImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  currentImageType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (ev) => {
    const result = ev.target.result;
    currentImageB64 = result.split(',')[1];
    document.getElementById('previewImg').src = result;
    document.getElementById('imgPreview').style.display = 'block';
    document.getElementById('extractBtn').style.display = 'block';
    document.getElementById('uploadArea').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  currentImageB64 = null;
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('extractBtn').style.display = 'none';
  document.getElementById('uploadArea').style.display = 'block';
  document.getElementById('imgInput').value = '';
}

async function extractText() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('APIキーを入力してね！'); return; }
  if (!currentImageB64) return;

  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  btn.textContent = '抽出中...';

  try {
    const resp = await fetch('/api/claude', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':apiKey},
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: {
                type: 'base64',
                media_type: currentImageB64 ? currentImageType : 'image/jpeg',
                data: currentImageB64
              }
            },
            {
              type: 'text',
              text: 'Extract only the YouTube comment text from this screenshot. Include all emoji exactly as they appear. Output ONLY the comment text, nothing else. No explanation, no quotes.'
            }
          ]
        }]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const extracted = data.content?.find(b=>b.type==='text')?.text?.trim() || '';
    document.getElementById('commentInput').value = extracted;
    clearImage();
    showError('');
    hideError();
  } catch(e) {
    showError('抽出エラー: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = '📝 テキストを抽出してコメント欄に入れる';
}

// AI CALL
async function callAI(msg, maxTokens) {
  const r = await fetch('/api/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey},
    body: JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens: maxTokens || 800,
      system: SYSTEM,
      messages:[{role:'user',content:msg}]
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return (d.content?.find(b=>b.type==='text')?.text?.trim() || '').replace(/^["「]|["」]$/g,'').trim();
}

function setStep(n, label) {
  document.getElementById('loadingLabel').textContent = label;
  for (let i=1;i<=4;i++) {
    const d = document.getElementById('dot'+i);
    if(d) d.className='step-dot'+(i<n?' done':i===n?' active':'');
  }
}

function renderLangBtns(activeCode) {
  document.getElementById('langButtons').innerHTML = LANGS.map(l =>
    `<button class="lang-btn${activeCode===l.code?' active':''}" onclick="switchLang('${l.code}','${l.label}','${l.flag}')">${l.flag} ${l.label}</button>`
  ).join('');
}

async function processComment() {
  apiKey = document.getElementById('apiKey').value.trim();
  currentComment = document.getElementById('commentInput').value.trim();
  if (!apiKey) { showError('APIキーを入力してね！'); return; }
  if (!currentComment) { showError('コメントを貼り付けてね！'); return; }

  hideError();
  document.getElementById('results').style.display = 'none';
  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('goBtn').disabled = true;

  try {
    setStep(1, '言語を検出中...');
    const langRaw = await callAI(
      `Detect the language of this comment. Reply ONLY with JSON (no markdown): {"code":"en","label":"English","flag":"🇬🇧","confidence":"high","note":""}
Use es-419 for Latin American Spanish. Note field for ambiguous cases.
Comment: "${currentComment}"`, 150
    );
    try {
      const parsed = JSON.parse(langRaw.replace(/```json|```/g,'').trim());
      currentLang = parsed;
    } catch(e) {}

    const conf = currentLang.confidence==='high'?'確実':currentLang.confidence==='medium'?'おそらく':'不明';
    document.getElementById('langBadge').innerHTML =
      `<div class="lang-badge">${currentLang.flag} <b>${currentLang.label}</b> <span class="lang-note">${conf}${currentLang.note?' — '+currentLang.note:''}</span></div>`;
    renderLangBtns(currentLang.code);

    setStep(2, '日本語に翻訳中...');
    const ja = await callAI(`Translate into natural, warm Japanese. Friendly and frank tone (not formal keigo), but with adult grace and refinement — never vulgar or rough. Keep emoji exactly as-is. Output ONLY the translation, no quotes.\n\n"${currentComment}"`, 600);

    setStep(3, `${currentLang.flag} 返信案を生成中...`);
    const reply = await callAI(`Write Cherry's reply in ${currentLang.label}. Follow all rules. Do NOT add quotation marks.\n\nComment: "${currentComment}"\n\nReply only:`, 600);

    setStep(4, '返信を日本語に変換中...');
    const replyJa = await callAI(`Translate into natural, warm Japanese. Friendly and frank (not formal keigo), but graceful and refined — never rough or vulgar. Keep emoji exactly as-is. Output ONLY the translation, no quotes.\n\n${reply}`, 600);

    document.getElementById('jaText').textContent = ja;
    document.getElementById('replyEnInput').value = reply;
    document.getElementById('replyJaInput').value = replyJa;
    document.getElementById('replyLangLabel').textContent = `${currentLang.flag} ${currentLang.label}`;

    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('results').style.display = 'block';

  } catch(e) {
    document.getElementById('loadingBox').style.display = 'none';
    showError('エラー: ' + e.message);
  }
  document.getElementById('goBtn').disabled = false;
}

async function switchLang(code, label, flag) {
  if (!currentComment) return;
  currentLang = {code, label, flag};
  renderLangBtns(code);
  document.querySelectorAll('.lang-btn').forEach(b => b.disabled = true);
  document.getElementById('replyLangLabel').textContent = `${flag} 変換中...`;

  try {
    const reply = await callAI(`Write Cherry's reply in ${label}. Follow all rules. No quotation marks.\n\nComment: "${currentComment}"\n\nReply only:`, 600);
    const replyJa = await callAI(`Translate into natural, warm Japanese. Friendly and frank (not formal keigo), but graceful and refined — never rough or vulgar. Keep emoji exactly as-is. Output ONLY the translation, no quotes.\n\n${reply}`, 600);
    document.getElementById('replyEnInput').value = reply;
    document.getElementById('replyJaInput').value = replyJa;
    document.getElementById('replyLangLabel').textContent = `${flag} ${label}`;
  } catch(e) { showError('エラー: ' + e.message); }

  document.querySelectorAll('.lang-btn').forEach(b => b.disabled = false);
  renderLangBtns(code);
}

// 英語→日本語に同期
async function syncEnToJa() {
  const en = document.getElementById('replyEnInput').value.trim();
  if (!apiKey || !en) return;
  const btn = document.querySelector('.sync-btn');
  document.getElementById('replyLangLabel').textContent = '変換中...';
  try {
    const ja = await callAI(`Translate into natural, warm Japanese. Friendly and frank (not formal keigo), but graceful and refined — never rough or vulgar. Keep emoji exactly as-is. Output ONLY the translation, no quotes.\n\n${en}`, 600);
    document.getElementById('replyJaInput').value = ja;
  } catch(e) { showError('エラー: ' + e.message); }
  document.getElementById('replyLangLabel').textContent = `${currentLang.flag} ${currentLang.label}`;
}

// 日本語→元言語に同期
async function syncJaToEn() {
  const ja = document.getElementById('replyJaInput').value.trim();
  if (!apiKey || !ja) return;
  document.getElementById('replyLangLabel').textContent = '変換中...';
  try {
    const reply = await callAI(`Translate into ${currentLang.label}. Keep tone and emoji as-is. Output ONLY translation, no quotes.\n\n${ja}`, 600);
    document.getElementById('replyEnInput').value = reply;
  } catch(e) { showError('エラー: ' + e.message); }
  document.getElementById('replyLangLabel').textContent = `${currentLang.flag} ${currentLang.label}`;
}

function copyArea(id, btn) {
  const el = document.getElementById(id);
  const text = el.tagName === 'TEXTAREA' ? el.value : el.textContent;
  navigator.clipboard?.writeText(text);
  btn.textContent = '✓ コピー完了';
  btn.classList.add('done');
  setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('done'); }, 2000);
}

function resetAll() {
  document.getElementById('commentInput').value = '';
  document.getElementById('results').style.display = 'none';
  hideError();
  clearImage();
  currentComment = '';
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}
</script>
