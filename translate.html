<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cherry's Translation Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #c8a97e;
    --good: #7ec8a0;
    --text: #e8e4dc;
    --muted: #7a7a8a;
    --danger: #c87e7e;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .container { max-width: 640px; margin: 0 auto; }

  .logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 4px; }
  .sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 24px; }

  .key-row { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }

  input[type="password"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--text);
    width: 100%;
  }
  input:focus { outline: none; border-color: var(--accent); }

  .save-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 10px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; cursor: pointer; white-space: nowrap;
  }
  .save-btn.saved { color: var(--good); border-color: var(--good); }

  label {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); display: block; margin-bottom: 6px;
  }

  textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    font-size: 0.88rem; color: var(--text); resize: vertical; line-height: 1.7; margin-bottom: 12px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .go-btn {
    width: 100%; background: linear-gradient(135deg, var(--accent), #e8c99e);
    border: none; color: #0d0d0f; padding: 13px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.9rem;
    cursor: pointer; margin-bottom: 24px; transition: opacity 0.2s;
  }
  .go-btn:hover { opacity: 0.88; }
  .go-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 14px;
  }

  .result-label {
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .copy-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 10px; border-radius: 5px; font-size: 0.65rem;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.done { color: var(--good); border-color: var(--good); }

  .result-text { font-size: 0.88rem; line-height: 1.8; color: var(--text); }
  .result-text.ja { font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }

  .lang-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 0.82rem;
    color: var(--text); margin-bottom: 14px;
  }
  .lang-note { font-size: 0.7rem; color: var(--muted); }

  .lang-section-label {
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 8px;
  }

  .lang-buttons { display: flex; flex-wrap: wrap; gap: 6px; }

  .lang-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 12px; border-radius: 20px; font-size: 0.72rem;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0f; font-weight: 500; }
  .lang-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .sync-btn {
    width: 100%; background: none; border: 1px solid var(--accent);
    color: var(--accent); padding: 10px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    cursor: pointer; margin-top: 8px; transition: all 0.15s;
  }
  .sync-btn:hover { background: var(--accent); color: #0d0d0f; }

  .loading {
    text-align: center; padding: 32px; color: var(--muted);
    font-size: 0.85rem; display: none;
  }

  .step-indicator {
    display: flex; align-items: center; gap: 8px;
    justify-content: center; margin-bottom: 10px;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); transition: background 0.3s;
  }
  .step-dot.active { background: var(--accent); animation: pulse 1s infinite; }
  .step-dot.done { background: var(--good); animation: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .error {
    background: #2e1a1a; border: 1px solid var(--danger);
    border-radius: 8px; padding: 12px 14px; font-size: 0.82rem;
    color: var(--danger); margin-bottom: 14px; display: none;
  }

  .reset-btn {
    width: 100%; background: none; border: 1px solid var(--border);
    color: var(--muted); padding: 10px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    cursor: pointer; margin-top: 8px;
  }

  #results { display: none; }
</style>
</head>
<body>
<div class="container">

  <div class="logo">✦ Cherry's Translation Tool</div>
  <div class="sub">コメント貼り付け → 言語自動検出 → 返信案を生成</div>

  <div class="key-row">
    <input type="password" id="apiKey" placeholder="Anthropic API Key (sk-ant-...)" />
    <button class="save-btn" id="saveBtn" onclick="saveKey()">保存</button>
  </div>

  <label>YouTubeコメントを貼り付け</label>
  <textarea id="commentInput" rows="5" placeholder="Paste YouTube comment here..."></textarea>

  <button class="go-btn" id="goBtn" onclick="processComment()">✦ 言語検出 + 返信案を生成</button>

  <div class="error" id="errorBox"></div>

  <div class="loading" id="loadingBox">
    <div class="step-indicator">
      <div class="step-dot" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
      <div class="step-dot" id="dot4"></div>
    </div>
    <div id="loadingLabel">処理中...</div>
  </div>

  <div id="results">

    <div class="result-box">
      <div class="result-label">🌍 検出された言語</div>
      <div id="langBadge"></div>
      <div class="lang-section-label">別の言語で返信する</div>
      <div class="lang-buttons" id="langButtons"></div>
    </div>

    <div class="result-box">
      <div class="result-label">
        🇯🇵 日本語訳（確認用）
        <button class="copy-btn" onclick="copyEl('jaText', this)">コピー</button>
      </div>
      <div class="result-text ja" id="jaText"></div>
    </div>

    <div class="result-box">
      <div class="result-label">
        <span>✦ 返信案 <span id="replyLangLabel" style="color:var(--accent);"></span></span>
        <button class="copy-btn" onclick="copyEl('replyText', this)">コピー</button>
      </div>
      <div class="result-text" id="replyText"></div>
    </div>

    <div class="result-box">
      <div class="result-label">✏️ 返信案（日本語）— 編集可能</div>
      <textarea id="replyJaInput" rows="4"></textarea>
      <button class="sync-btn" onclick="syncToOriginal()">↺ 日本語を編集したら元の言語に同期</button>
    </div>

    <button class="reset-btn" onclick="resetAll()">↩ リセット</button>

  </div>

</div>
<script>
const SYSTEM = `You are helping Cherry, a 55-year-old Japanese woman who makes English YouTube videos about solo life in Tokyo. Authentic, intellectual, witty, punk rock spirit. Has a Spanish partner of 10+ years but keeps channel focused on solo life.

REPLY RULES:
- Tone: warm, light, elegant, never pushy, adult wit
- Match commenter's greeting style
- Emoji: sparingly, 🤭 only for self-deprecating moments
- NEVER use: "It means a lot to me", "Your words mean a lot", "I believe", "Thank you for being here", em dash (—), commenter's name, thoughtful/insightful/meaningful as compliments
- No paragraph breaks in replies
- Simple compliment → just "Thank you 😊"
- Always reply in same language as commenter unless told otherwise
- If someone hopes she finds love → mention wonderful 10+ year partner
- No politics/religion/ideology`;

const LANGS = [
  {code:'en',label:'English',flag:'🇬🇧'},
  {code:'es',label:'Español',flag:'🇪🇸'},
  {code:'es-419',label:'Español Latino',flag:'🌎'},
  {code:'fr',label:'Français',flag:'🇫🇷'},
  {code:'it',label:'Italiano',flag:'🇮🇹'},
  {code:'de',label:'Deutsch',flag:'🇩🇪'},
  {code:'pt',label:'Português',flag:'🇧🇷'},
  {code:'ja',label:'日本語',flag:'🇯🇵'},
  {code:'ko',label:'한국어',flag:'🇰🇷'},
  {code:'zh',label:'中文',flag:'🇨🇳'},
  {code:'ru',label:'Русский',flag:'🇷🇺'},
  {code:'sv',label:'Svenska',flag:'🇸🇪'},
  {code:'nl',label:'Nederlands',flag:'🇳🇱'},
  {code:'pl',label:'Polski',flag:'🇵🇱'},
];

let currentLang = {code:'en', label:'English', flag:'🇬🇧'};
let currentComment = '';
let apiKey = '';

window.addEventListener('load', () => {
  const saved = localStorage.getItem('cherry_ak');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('saveBtn').textContent = '保存済 ✓';
    document.getElementById('saveBtn').classList.add('saved');
  }
});

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k) return;
  localStorage.setItem('cherry_ak', k);
  const btn = document.getElementById('saveBtn');
  btn.textContent = '保存済 ✓';
  btn.classList.add('saved');
}

async function callAI(msg, maxTokens) {
  const r = await fetch('/api/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey},
    body: JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens: maxTokens || 400,
      system: SYSTEM,
      messages:[{role:'user',content:msg}]
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.content?.find(b=>b.type==='text')?.text?.trim() || '';
}

function setStep(n, label) {
  document.getElementById('loadingLabel').textContent = label;
  for (let i=1;i<=4;i++) {
    const d = document.getElementById('dot'+i);
    if(d) d.className = 'step-dot'+(i<n?' done':i===n?' active':'');
  }
}

function renderLangBtns(activeCode) {
  document.getElementById('langButtons').innerHTML = LANGS.map(l =>
    `<button class="lang-btn${activeCode===l.code?' active':''}" onclick="switchLang('${l.code}','${l.label}','${l.flag}')">${l.flag} ${l.label}</button>`
  ).join('');
}

async function processComment() {
  apiKey = document.getElementById('apiKey').value.trim();
  currentComment = document.getElementById('commentInput').value.trim();
  if (!apiKey) { showError('APIキーを入力してね！'); return; }
  if (!currentComment) { showError('コメントを貼り付けてね！'); return; }

  hideError();
  document.getElementById('results').style.display = 'none';
  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('goBtn').disabled = true;

  try {
    setStep(1, '言語を検出中...');
    const langRaw = await callAI(
      `Detect the language of this comment. Reply ONLY with JSON: {"code":"en","label":"English","flag":"🇬🇧","confidence":"high","note":""}
Use es-419 for Latin American Spanish. Note field for ambiguous cases (e.g. "possibly Russian or Ukrainian").
Comment: "${currentComment}"`, 150
    );
    try {
      const parsed = JSON.parse(langRaw.replace(/```json|```/g,'').trim());
      currentLang = parsed;
    } catch(e) {}

    const conf = currentLang.confidence === 'high' ? '確実' : currentLang.confidence === 'medium' ? 'おそらく' : '不明';
    document.getElementById('langBadge').innerHTML =
      `<div class="lang-badge">${currentLang.flag} <b>${currentLang.label}</b> <span class="lang-note">${conf}${currentLang.note ? ' — '+currentLang.note : ''}</span></div>`;
    renderLangBtns(currentLang.code);

    setStep(2, '日本語に翻訳中...');
    const ja = await callAI(`Translate into casual friendly Japanese (タメ口, no keigo). Keep emoji as-is. Output ONLY translation.\n\n"${currentComment}"`, 300);

    setStep(3, `${currentLang.flag} 返信案を生成中...`);
    const reply = await callAI(`Write Cherry's reply in ${currentLang.label}. Follow all rules.\n\nComment: "${currentComment}"\n\nReply only:`, 300);

    setStep(4, '返信を日本語に変換中...');
    const replyJa = await callAI(`Translate into casual Japanese (タメ口). Keep emoji as-is. Output ONLY translation.\n\n"${reply}"`, 300);

    document.getElementById('jaText').textContent = ja;
    document.getElementById('replyText').textContent = reply;
    document.getElementById('replyJaInput').value = replyJa;
    document.getElementById('replyLangLabel').textContent = `${currentLang.flag} ${currentLang.label}`;

    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('results').style.display = 'block';

  } catch(e) {
    document.getElementById('loadingBox').style.display = 'none';
    showError('エラー: ' + e.message);
  }
  document.getElementById('goBtn').disabled = false;
}

async function switchLang(code, label, flag) {
  if (!currentComment) return;
  currentLang = {code, label, flag};
  renderLangBtns(code);
  document.querySelectorAll('.lang-btn').forEach(b => b.disabled = true);
  document.getElementById('replyLangLabel').textContent = `${flag} 変換中...`;

  try {
    const reply = await callAI(`Write Cherry's reply in ${label}. Follow all rules.\n\nComment: "${currentComment}"\n\nReply only:`, 300);
    const replyJa = await callAI(`Translate into casual Japanese (タメ口). Keep emoji as-is. Output ONLY translation.\n\n"${reply}"`, 300);
    document.getElementById('replyText').textContent = reply;
    document.getElementById('replyJaInput').value = replyJa;
    document.getElementById('replyLangLabel').textContent = `${flag} ${label}`;
  } catch(e) { showError('エラー: ' + e.message); }

  document.querySelectorAll('.lang-btn').forEach(b => b.disabled = false);
  renderLangBtns(code);
}

async function syncToOriginal() {
  const ja = document.getElementById('replyJaInput').value.trim();
  if (!apiKey || !ja) return;
  const langLabel = currentLang.label;
  document.getElementById('replyLangLabel').textContent = '変換中...';
  try {
    const reply = await callAI(`Translate this Japanese text to ${langLabel}. Keep tone and emoji as-is. Output ONLY translation.\n\n"${ja}"`, 300);
    document.getElementById('replyText').textContent = reply;
  } catch(e) { showError('エラー: ' + e.message); }
  document.getElementById('replyLangLabel').textContent = `${currentLang.flag} ${langLabel}`;
}

function copyEl(id, btn) {
  navigator.clipboard?.writeText(document.getElementById(id).textContent);
  btn.textContent = '✓ コピー完了';
  btn.classList.add('done');
  setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('done'); }, 2000);
}

function resetAll() {
  document.getElementById('commentInput').value = '';
  document.getElementById('results').style.display = 'none';
  hideError();
  currentComment = '';
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}
</script>
</body>
</html>
